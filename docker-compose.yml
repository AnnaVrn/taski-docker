# docker-compose.yml

volumes:
  pg_data:
  static:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - proxy-network
  backend:
    build: ./backend/
    env_file: .env
    volumes:
      - static:/backend_static
    networks:
      - proxy-network

  frontend:
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
    networks:
      - proxy-network

  gateway:
    build: ./gateway/
    env_file: .env
    volumes:
      - static:/staticfiles
    networks:
      - proxy-network
    environment:
      - VIRTUAL_HOST=annacheltaski.myftp.biz
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=annacheltaski.myftp.biz
      - LETSENCRYPT_EMAIL=frolovaannaalex@mail.ru

networks:
  default:
    name: proxy-network
    external: true